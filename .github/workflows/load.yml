name: load

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'

jobs:
  backpressure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: enable yarn
        run: corepack enable && corepack prepare yarn@4.13.0 --activate
      - name: install deps
        run: yarn install
      - name: bring up stack
        run: docker compose up -d --wait --build
      - name: run load test
        run: yarn workspace @realtime-voice-infra/stream-server exec tsx scripts/load-backpressure.ts
        env:
          STREAM_SERVER_URL: http://localhost:3000
          REDIS_URL: redis://localhost:6379
          VUS: '100'
          DURATION_S: '60'
          FRAMES_PER_SECOND: '50'
          SUMMARY_PATH: ${{ github.workspace }}/summary.json
      - name: dump server logs
        if: failure()
        run: docker compose logs stream-server redis > server-logs.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-summary
          path: |
            summary.json
            server-logs.txt
