services:
  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    command: ['redis-server', '--save', '', '--appendonly', 'no']

  stream-server:
    build:
      context: .
      dockerfile: apps/stream-server/Dockerfile
    environment:
      PORT: '3000'
      HOST: '0.0.0.0'
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-only-insecure-secret-change-me-32b}
      LOG_LEVEL: info
    ports: ['3000:3000']
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 5s

  adminer:
    image: adminer:latest
    ports: ['8080:8080']
    profiles: ['debug']

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - '16686:16686'
      - '4318:4318'
    profiles: ['observability']
